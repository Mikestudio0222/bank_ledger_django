{% extends 'ledger/base.html' %}

{% block title %}编辑银行卡 - 记账工具{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">
                    <i class="fas fa-edit me-2"></i>编辑银行卡
                </h4>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">卡片名称</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">当前余额</label>
                        <p class="form-control bg-light text-muted mb-0">¥{{ bank_card.balance }}</p>
                    </div>

                    {{ form.icon }}

                    <div class="d-flex gap-2">
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary flex-fill py-3">
                            取消
                        </a>
                        <button type="submit" class="btn btn-success flex-fill py-3">
                            <i class="fas fa-check me-2"></i>保存修改
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
