{% extends 'ledger/base.html' %}

{% block title %}添加银行卡 - 记账工具{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">
                    <i class="fas fa-credit-card me-2"></i>添加银行卡
                </h4>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">卡片名称</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">选择图标</label>
                        <div class="row g-3" id="icon-selector">
                            <div class="col-3">
                                <button type="button" class="icon-btn btn btn-outline-primary w-100 py-3" data-icon="fa-building-columns">
                                    <i class="fas fa-building-columns fa-2x"></i>
                                </button>
                            </div>
                            <div class="col-3">
                                <button type="button" class="icon-btn btn btn-primary w-100 py-3" data-icon="fa-credit-card">
                                    <i class="fas fa-credit-card fa-2x"></i>
                                </button>
                            </div>
                            <div class="col-3">
                                <button type="button" class="icon-btn btn btn-outline-primary w-100 py-3" data-icon="fa-money-bill-wave">
                                    <i class="fas fa-money-bill-wave fa-2x"></i>
                                </button>
                            </div>
                            <div class="col-3">
                                <button type="button" class="icon-btn btn btn-outline-primary w-100 py-3" data-icon="fa-wallet">
                                    <i class="fas fa-wallet fa-2x"></i>
                                </button>
                            </div>
                        </div>
                        {{ form.icon }}
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary flex-fill py-3">
                            取消
                        </a>
                        <button type="submit" class="btn btn-primary flex-fill py-3">
                            <i class="fas fa-check me-2"></i>保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var iconInput = document.getElementById('id_icon');
        var selected = document.querySelector('.icon-btn.btn-primary');
        // 初始化隐藏字段的值
        if (selected && iconInput && !iconInput.value) {
            iconInput.value = selected.getAttribute('data-icon');
        }

        // 图标选择事件委托
        document.getElementById('icon-selector').addEventListener('click', function(e) {
            var btn = e.target.closest('.icon-btn');
            if (!btn) return;
            e.preventDefault();

            document.querySelectorAll('.icon-btn').forEach(function(b) {
                b.classList.remove('btn-primary');
                b.classList.add('btn-outline-primary');
            });
            btn.classList.remove('btn-outline-primary');
            btn.classList.add('btn-primary');
            iconInput.value = btn.getAttribute('data-icon');
        });
    });
</script>
{% endblock %}
